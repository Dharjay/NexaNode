<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5/daisyui.css"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Inter:ital,opsz,wght@0,14..32,100..900&family=Poppins:ital,wght@0,100;0,400;0,600;0,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/app.css" />
    <title>NexaNode - Auth</title>
  </head>
  <body
    class="bg-[#080d10] text-white primary-font min-h-screen flex items-center justify-center px-5 py-10"
  >
    <!-- Auth Wrapper -->
    <div
      class="w-full max-w-[1000px] grid grid-cols-1 lg:grid-cols-2 min-h-[600px] border border-white/10 rounded-2xl overflow-hidden"
    >
      <!-- LEFT PANEL -->
      <div
        class="bg-[#0d1418] flex flex-col justify-between p-10 relative overflow-hidden"
      >
        <!-- Background texture -->
        <div
          class="absolute inset-0 opacity-5"
          style="
            background-image:
              radial-gradient(circle at 20% 50%, white 1px, transparent 1px),
              radial-gradient(circle at 80% 20%, white 1px, transparent 1px);
            background-size: 40px 40px;
          "
        ></div>

        <!-- Logo -->
        <div class="relative z-10">
          <a href="index.html">
            <img
              src="assets/images/NEXALOGO.png"
              alt="NexaNode"
              class="w-[120px]"
            />
          </a>
        </div>

        <!-- Quote -->
        <div class="relative z-10 mt-auto">
          <p
            class="secondary-font text-2xl lg:text-3xl font-bold leading-snug text-white/90"
          >
            Building the next generation of connected digital experiences.
          </p>
          <p class="primary-font text-sm text-white/40 mt-4">
            Web design & development company based in the Philippines.
          </p>
          <!-- Decorative line -->
          <div class="mt-8 flex gap-2">
            <div class="h-[2px] w-10 bg-white rounded-full"></div>
            <div class="h-[2px] w-4 bg-white/30 rounded-full"></div>
            <div class="h-[2px] w-2 bg-white/10 rounded-full"></div>
          </div>
        </div>
      </div>

      <!-- RIGHT PANEL -->
      <div class="bg-[#080d10] flex flex-col justify-center p-10">
        <!-- Tab Toggle -->
        <div class="flex gap-1 bg-white/5 rounded-lg p-1 mb-8 secondary-font">
          <button
            type="button"
            id="tab-login"
            onclick="switchTab('login')"
            class="flex-1 py-2 text-sm font-semibold rounded-md transition-all duration-200 bg-white text-black"
          >
            LOGIN
          </button>
          <button
            type="button"
            id="tab-register"
            onclick="switchTab('register')"
            class="flex-1 py-2 text-sm font-semibold rounded-md transition-all duration-200 text-white/50 hover:text-white"
          >
            REGISTER
          </button>
        </div>

        <!-- ─── LOGIN FORM ─── -->
        <form
          id="login-form"
          method="POST"
          action="/login"
          class="flex flex-col gap-5"
        >
          <div>
            <p
              class="secondary-font font-bold text-xs tracking-widest text-white/50 mb-2"
            >
              EMAIL ADDRESS
            </p>
            <div class="relative">
              <input
                type="email"
                id="login_email"
                name="email"
                placeholder="you@example.com"
                class="w-full bg-transparent border-b border-[#3F3E3E] pl-2 py-2 text-sm outline-none focus:border-white transition-colors placeholder:text-white/20"
              />
              <p
                id="login_email_error"
                class="absolute -bottom-5 left-0 text-red-400 text-xs hidden"
              ></p>
            </div>
          </div>

          <div class="mt-2">
            <p
              class="secondary-font font-bold text-xs tracking-widest text-white/50 mb-2"
            >
              PASSWORD
            </p>
            <div class="relative">
              <input
                type="password"
                id="login_password"
                name="password"
                placeholder="••••••••"
                class="w-full bg-transparent border-b border-[#3F3E3E] pl-2 py-2 text-sm outline-none focus:border-white transition-colors placeholder:text-white/20 pr-10"
              />
              <button
                type="button"
                onclick="togglePassword('login_password', 'eye-login')"
                class="absolute right-2 top-1/2 -translate-y-1/2 text-white/30 hover:text-white transition"
              >
                <svg
                  id="eye-login"
                  xmlns="http://www.w3.org/2000/svg"
                  class="w-4 h-4"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                  />
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                  />
                </svg>
              </button>
              <p
                id="login_password_error"
                class="absolute -bottom-5 left-0 text-red-400 text-xs hidden"
              ></p>
            </div>
          </div>

          <div class="flex justify-end mt-1">
            <a
              href="/forgot-password"
              class="text-xs text-white/40 hover:text-white transition"
              >Forgot password?</a
            >
          </div>

          <button
            type="submit"
            class="w-full mt-2 py-3 bg-white text-black text-sm font-bold secondary-font rounded-md hover:bg-white/90 transition-all duration-200"
          >
            LOGIN ->
          </button>

          <p class="text-center text-xs text-white/30 mt-2">
            Don't have an account?
            <button
              type="button"
              onclick="switchTab('register')"
              class="text-white underline underline-offset-2 hover:text-white/80 transition"
            >
              Register
            </button>
          </p>
        </form>

        <!-- ─── REGISTER FORM ─── -->
        <form
          id="register-form"
          method="POST"
          action="/register"
          class="flex flex-col gap-5 hidden"
        >
          <div class="grid grid-cols-2 gap-4">
            <div>
              <p
                class="secondary-font font-bold text-xs tracking-widest text-white/50 mb-2"
              >
                FIRST NAME
              </p>
              <div class="relative">
                <input
                  type="text"
                  id="reg_firstname"
                  name="first_name"
                  placeholder="Juan"
                  class="w-full bg-transparent border-b border-[#3F3E3E] pl-2 py-2 text-sm outline-none focus:border-white transition-colors placeholder:text-white/20"
                />
                <p
                  id="reg_firstname_error"
                  class="absolute -bottom-5 left-0 text-red-400 text-xs hidden"
                ></p>
              </div>
            </div>
            <div>
              <p
                class="secondary-font font-bold text-xs tracking-widest text-white/50 mb-2"
              >
                LAST NAME
              </p>
              <div class="relative">
                <input
                  type="text"
                  id="reg_lastname"
                  name="last_name"
                  placeholder="Dela Cruz"
                  class="w-full bg-transparent border-b border-[#3F3E3E] pl-2 py-2 text-sm outline-none focus:border-white transition-colors placeholder:text-white/20"
                />
                <p
                  id="reg_lastname_error"
                  class="absolute -bottom-5 left-0 text-red-400 text-xs hidden"
                ></p>
              </div>
            </div>
          </div>

          <div class="mt-2">
            <p
              class="secondary-font font-bold text-xs tracking-widest text-white/50 mb-2"
            >
              EMAIL ADDRESS
            </p>
            <div class="relative">
              <input
                type="email"
                id="reg_email"
                name="email"
                placeholder="you@example.com"
                class="w-full bg-transparent border-b border-[#3F3E3E] pl-2 py-2 text-sm outline-none focus:border-white transition-colors placeholder:text-white/20"
              />
              <p
                id="reg_email_error"
                class="absolute -bottom-5 left-0 text-red-400 text-xs hidden"
              ></p>
            </div>
          </div>

          <div class="mt-2">
            <p
              class="secondary-font font-bold text-xs tracking-widest text-white/50 mb-2"
            >
              PASSWORD
            </p>
            <div class="relative">
              <input
                type="password"
                id="reg_password"
                name="password"
                placeholder="Min. 8 characters"
                class="w-full bg-transparent border-b border-[#3F3E3E] pl-2 py-2 text-sm outline-none focus:border-white transition-colors placeholder:text-white/20 pr-10"
              />
              <button
                type="button"
                onclick="togglePassword('reg_password', 'eye-reg')"
                class="absolute right-2 top-1/2 -translate-y-1/2 text-white/30 hover:text-white transition"
              >
                <svg
                  id="eye-reg"
                  xmlns="http://www.w3.org/2000/svg"
                  class="w-4 h-4"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                  />
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                  />
                </svg>
              </button>
              <p
                id="reg_password_error"
                class="absolute -bottom-5 left-0 text-red-400 text-xs hidden"
              ></p>
            </div>
            <!-- Password strength -->
            <div class="flex gap-1 mt-3">
              <div
                id="strength-1"
                class="h-[3px] flex-1 rounded-full bg-white/10 transition-all duration-300"
              ></div>
              <div
                id="strength-2"
                class="h-[3px] flex-1 rounded-full bg-white/10 transition-all duration-300"
              ></div>
              <div
                id="strength-3"
                class="h-[3px] flex-1 rounded-full bg-white/10 transition-all duration-300"
              ></div>
              <div
                id="strength-4"
                class="h-[3px] flex-1 rounded-full bg-white/10 transition-all duration-300"
              ></div>
            </div>
            <p id="strength-label" class="text-xs text-white/30 mt-1"></p>
          </div>

          <div class="mt-2">
            <p
              class="secondary-font font-bold text-xs tracking-widest text-white/50 mb-2"
            >
              CONFIRM PASSWORD
            </p>
            <div class="relative">
              <input
                type="password"
                id="reg_password_confirm"
                name="password_confirmation"
                placeholder="Re-enter password"
                class="w-full bg-transparent border-b border-[#3F3E3E] pl-2 py-2 text-sm outline-none focus:border-white transition-colors placeholder:text-white/20 pr-10"
              />
              <button
                type="button"
                onclick="togglePassword('reg_password_confirm', 'eye-confirm')"
                class="absolute right-2 top-1/2 -translate-y-1/2 text-white/30 hover:text-white transition"
              >
                <svg
                  id="eye-confirm"
                  xmlns="http://www.w3.org/2000/svg"
                  class="w-4 h-4"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                  />
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                  />
                </svg>
              </button>
              <p
                id="reg_confirm_error"
                class="absolute -bottom-5 left-0 text-red-400 text-xs hidden"
              ></p>
            </div>
          </div>

          <div class="flex items-start gap-2 mt-2">
            <input
              type="checkbox"
              id="reg_terms"
              name="terms"
              class="mt-1 accent-white"
            />
            <label
              for="reg_terms"
              class="text-xs text-white/40 leading-relaxed"
            >
              I agree to the
              <a href="#" class="text-white underline underline-offset-2"
                >Terms of Service</a
              >
              and
              <a href="#" class="text-white underline underline-offset-2"
                >Privacy Policy</a
              >
            </label>
          </div>
          <p id="reg_terms_error" class="text-red-400 text-xs -mt-3 hidden"></p>

          <button
            type="submit"
            class="w-full mt-1 py-3 bg-white text-black text-sm font-bold secondary-font rounded-md hover:bg-white/90 transition-all duration-200"
          >
            CREATE ACCOUNT ->
          </button>

          <p class="text-center text-xs text-white/30">
            Already have an account?
            <button
              type="button"
              onclick="switchTab('login')"
              class="text-white underline underline-offset-2 hover:text-white/80 transition"
            >
              Login
            </button>
          </p>
        </form>
      </div>
    </div>

    <script src="assets/js/auth_validation.js"></script>
  </body>
</html>
